  main_rhyme_pattern: 主歌排韵(-아/-와) → 预副歌掺韵(-던/eɪ) → 副歌锚点(home) → Chant重复(home/come)
  special_techniques:
    - "Come Back Home"作全曲标题锚点，副歌+Chant段密集重复
    - 数字"One two three / Four five six"作主歌节奏引入，制造律动感
    - Chant段"Come baby baby come come baby"极简重复制造催眠效果
