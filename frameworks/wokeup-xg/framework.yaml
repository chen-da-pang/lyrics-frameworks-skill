rhyme_audit:
  main_rhyme: short-i /ɪ/（一七辙对应）
  main_rhyme_pattern: 副歌ABAB重复押韵；主歌AABB连押+内韵
  special_techniques:
    - 多音节押韵（ordinary/honorary，automated/motivator）
    - 内韵密集（同行内多处押韵）
    - 说唱flow切换（verse节奏变化）
    - 自我指涉（XG baby/X/XGALX）
    - 短句爆发（Surf on 'em / Uh huh）
