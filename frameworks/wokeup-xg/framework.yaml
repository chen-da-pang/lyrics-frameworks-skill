    role: 桥段（Bridge）
    round: R2
    line_range: L64-L80
    char_pattern: 混合短句与流动行
    rhyme_summary: easy/graffiti/addy/know/all I know；superstitions/do/time/world；ship/it/kids/kin；party/mardi gras/HARVEY/barbie doll；laughin'/blast away/packed away；COCO/mercy/unnie/OG；bags/mags/pack/attack，密集AABB

