  - segment_id: S3
    role: 主歌二（Verse 2）
    round: R1
    line_range: L18-L24
    char_pattern: 流动说唱行
    rhyme_summary: outside/plane/right now/bed/way/great/X，散韵+内韵

  - segment_id: S4
    role: 主歌三（Verse 3）
    round: R1
    line_range: L25-L37
    char_pattern: 流动说唱行
    rhyme_summary: ordinary/honorary/broke/jury/hear it/fearin'/low；automated/motivator/merrier/entertainment/fascinated/hilarious，多音节押韵

  - segment_id: S5
    role: 主歌四（Verse 4）
    round: R2
    line_range: L38-L55
    char_pattern: 流动说唱行，含短句
    rhyme_summary: uh/yeah/now/down/buss down/bus down/custom now/rushin' out/push me out；motor/kid tho/rip tho/flip phone/intro/64/drift tho，密集内韵

