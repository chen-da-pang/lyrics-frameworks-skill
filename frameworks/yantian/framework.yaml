meta:
  song_id: yantian
  song_name: 炎天（分析曲）
  artist: unknown
  language: 粤语
  structure: 3轮 9段 30句
  rhyme_style: 散韵为主，S2中东辙(-ong)，S8/S9中东辙+衣期辙混用(-ei/-ui/-i)
  hook_sentence: 你怎睡难寐 怎醉寻味 怎会锁眉 怎会欢喜

segments:
  - id: S1
    role: Verse
    round: R1
    lines: [L01, L02]
    note: 回忆引入，7字句，言前辙(-ian)
  - id: S2
    role: Pre-Chorus
    round: R1
    lines: [L03, L04, L05, L06]
    note: 情绪递进，短句+长句交替，中东辙(-ong)
  - id: S3
    role: Chorus
    round: R1
    lines: [L07, L08, L09, L10]
    note: 主歌核心，意象密集，散韵
  - id: S4
    role: Chorus延续
    round: R1
    lines: [L11, L12, L13, L14]
    note: 情绪高潮，散韵
  - id: S5
    role: Verse
    round: R2
    lines: [L15, L16, L17, L18]
    note: S1压缩回返，意象从"记忆"转向"行动"，6/6/7/5字
  - id: S6
    role: Pre-Chorus
    round: R2
    lines: [L19, L20, L21]
    note: S2压缩回返，三重复句"苗焰"，7字×3
  - id: S7
    role: Bridge
    round: R3
    lines: [L22]
    note: 单句转折，4字，引入疑问情绪
  - id: S8
    role: Chorus变体
    round: R3
    lines: [L23, L24, L25, L26]
    note: Hook段，疑问句式四连，中东辙+衣期辙
  - id: S9
    role: Outro
    round: R3
    lines: [L27, L28, L29, L30]
    note: 完全重复S8，回环收尾

