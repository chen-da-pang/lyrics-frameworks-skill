meta:
  song_id: yantian
  song_name: 炎炎夏日
  artist: 曾舜晞
  language: zh-yue
  total_lines: 30
  total_segments: 5
  rounds: 2
  rhyme_style: "全曲主韵灰堆辙（ei/ui），副歌掺韵式准排韵，主歌自由韵/随韵，预副歌一字韵倾向（焰×3）"
  main_rhyme_vowel: "ei/ui"
  main_rhyme_zhe: "灰堆辙"
  special_techniques:
    - "一字韵倾向（苗焰×3，S3末三句）"
    - "头韵链（怎×4，S4副歌）"
    - "掺韵（L26 喜 i，打破ei主韵）"
    - "句内内韵（L01 炎/天 ian）"
    - "跨轮次遥韵（L07 热 / L22 烈，乜斜辙）"
  mood: "怀旧与释怀，遗憾但不凄凉"
  structure_note: "R2极度压缩，仅保留副歌回返（S5=S4完全重复）"
  hook_sentence: "你怎睡难寐 怎醉寻味 怎会锁眉 怎会欢喜"

segments:
  - segment_id: S1
    role: 主歌一
    round: R1
    line_range: [L01, L06]
    line_count: 6
    rhyme_pattern: "自由韵/多韵并用，无主韵"
    dominant_zhe: "多辙（言前/中东/姑苏/灰堆）"
    char_pattern: "8-8-5-5-5-6"
    notes: "两句长句（8字）开场，后四句短句（5-6字）收束，节奏由宽到紧"

  - segment_id: S2
    role: 主歌二
    round: R1
    line_range: [L07, L14]
    line_count: 8
    rhyme_pattern: "随韵（ao组L11-L12，an组L13-L14，前半散韵）"
    dominant_zhe: "遥条辙+言前辙"
    char_pattern: "4-7-5-6-7-7-6-6"
    notes: "4字时间引子短句开场，后接7字意象句，中段两组偶韵收束"

  - segment_id: S3
    role: 预副歌
    round: R1
    line_range: [L15, L21]
    line_count: 7
    rhyme_pattern: "末三句一字韵倾向（焰×3），前四句散韵"
    dominant_zhe: "言前辙（末三句）"
    char_pattern: "6-7-7-5-7-7-7"
    notes: "前四句超现实行为句抬升，末三句叠字苗焰顿挫，强预副歌信号"

  - segment_id: S4
    role: 副歌
    round: R1
    line_range: [L22, L26]
    line_count: 5
    rhyme_pattern: "掺韵式准排韵（ei主韵L23-L25，L26喜掺韵）"
    dominant_zhe: "灰堆辙（ei/ui）"
    char_pattern: "4-5-4-4-4"
    notes: "4字时间引子短句开场，后四句Hook组（怎×4头韵），L26掺韵"
    hook_lines: [L23, L24, L25, L26]

  - segment_id: S5
    role: 副歌回返
    round: R2
    line_range: [L27, L30]
    line_count: 4
    rhyme_pattern: "完全回返S4 L23-L26"
    dominant_zhe: "灰堆辙（ei/ui）"
    char_pattern: "5-4-4-4"
    notes: "S5 = S4的L23-L26完全重复，省略时间引子短句L22"
    return_mapping:
      L27: "= L23 完全重复"
      L28: "= L24 完全重复"
      L29: "= L25 完全重复"
      L30: "= L26 完全重复"

