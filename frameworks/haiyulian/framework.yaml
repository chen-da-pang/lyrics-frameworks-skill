  - segment_id: S7
    role: 桥段
    round: R2
    line_range: L36-L40
    char_pattern: 5/4/5/4/1
    rhyme_summary: 押"i"韵（魔力/奇遇/可思议/可语），密集排韵

  - segment_id: S8
    role: 副歌（尾段）
    round: R2
    line_range: L41-L46
    char_pattern: 9/5/9/6/5/12
