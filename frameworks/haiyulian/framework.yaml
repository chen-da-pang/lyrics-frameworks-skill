rhyme_audit:
  main_rhyme: 一七辙（i/ì）
  main_rhyme_pattern: 奇句押韵（ABAB式），主歌段偶韵
  special_techniques:
    - 叠字开头（轻轻柔柔、甜甜蜜蜜、缓缓慢慢）
    - 季节意象平行复沓（春天/初夏）
    - 感叹词"喔"作为情绪锚点
    - 主歌一二结构完全对称
