  rhyme_style: 以"意/气/丽/力"等"一七辙"为主韵，偶韵为主，副歌转入"言前辙"
  main_rhyme_vowel: i（一七辙）
  tags: [情歌, 季节意象, 花卉, 暗恋, 台湾流行]

segments:
  - segment_id: S1
