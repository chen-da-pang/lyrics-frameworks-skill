    char_pattern: 5/7/8/7/5/5/4
    rhyme_summary: 奇句押"i"韵（气息/诗意/美丽），偶韵排韵

  - segment_id: S2
    role: 主歌二（夏）
    round: R1
    line_range: L08-L14
    char_pattern: 5/7/8/7/5/5/4
    rhyme_summary: 同S1结构，押"i"韵（气息/凉意/活力），平行复沓

  - segment_id: S3
    role: 预副歌一
    round: R1
    line_range: L15-L18
    char_pattern: 6/5/9/1
    rhyme_summary: 转入"言前辙"（季节/相遇），散韵过渡

  - segment_id: S4
    role: 预副歌二
    round: R1
    line_range: L19-L21
    char_pattern: 6/5/10
    rhyme_summary: 押"an"韵（暧昧/季节/甜），掺韵式准排韵

  - segment_id: S5
    role: 主歌二复现（夏）
    round: R2
    line_range: L22-L28
    char_pattern: 5/7/8/7/5/5/4
    rhyme_summary: 与S2完全重复，押"i"韵

  - segment_id: S6
    role: 预副歌复现
    round: R2
    line_range: L29-L35
    char_pattern: 6/5/9/1/6/5/10
