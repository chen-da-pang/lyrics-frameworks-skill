    round: R1
    line_range: L01-L05
    char_pattern: 2/8/7/7/3
    rhyme_summary: 等待/依赖/疑问/爱，押"ai"韵（怀来辙），排韵

  - segment_id: S2
    role: 主歌二
    round: R1
    line_range: L06-L10
