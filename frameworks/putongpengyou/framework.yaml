  - segment_id: S3
    role: 预副歌
    round: R1
    line_range: L11-L12
    char_pattern: 9/9
    rhyme_summary: 改变/再来一遍，押"an"韵（言前辙），掺韵过渡

  - segment_id: S4
    role: 副歌一
    round: R1
    line_range: L13-L20
    char_pattern: 8/6/7/4/8/4/8/8
    rhyme_summary: 朋友/深/放手/friend/朋友/friend/坦白/收不回来，中英混合押韵，"friend"为锚点

  - segment_id: S5
    role: 主歌二复现
    round: R2
    line_range: L21-L25
    char_pattern: 同S2
