  rhyme_style: 中英混合，主歌押"ai/ai"（怀来辙），副歌以"朋友/friend"为锚点，掺韵式准排韵
  main_rhyme_vowel: ai（怀来辙）
  tags: [情歌, 失恋, 中英混合, 台湾流行, R&B, 单相思]

