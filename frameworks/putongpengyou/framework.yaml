    role: 预副歌复现
    round: R2
    line_range: L26-L27
    char_pattern: 同S3
    rhyme_summary: 同S3，押"an"韵

  - segment_id: S7
    role: 副歌二（复现）
    round: R2
    line_range: L28-L35
    char_pattern: 同S4
    rhyme_summary: 同S4，中英混合押韵

  - segment_id: S8
    role: 尾段（Outro）
    round: R2
    line_range: L36-L38
    char_pattern: 3/8/7
    rhyme_summary: no×3/不能只是做你的朋友/不能做普通朋友，押"ou"韵（遥条辙），收尾

rhyme_audit:
  main_rhyme: 怀来辙（ai）
  main_rhyme_pattern: 主歌排韵（AAAA式）；副歌中英混合掺韵
  special_techniques:
    - 中英语码切换（what can I do/just give me a chance/I only wanna be your friend）
    - 括号内英文注释式插入
    - 单字起句（等待/我猜）制造停顿感
    - 副歌"朋友/friend"双语锚点
    - 尾段no×3情绪爆发
