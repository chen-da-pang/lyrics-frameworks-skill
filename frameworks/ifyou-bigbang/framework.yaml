rhyme_audit:
  main_rhyme: "-요 / -까요"
  main_rhyme_pattern: 偶韵为主（ABAB/AABB混用），副歌锚点重复
  special_techniques:
    - 英韩双语切换（If you锚点+韩文展开）
    - 疑问句尾统一制造悬念感
