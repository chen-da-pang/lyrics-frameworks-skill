rhyme_audit:
  main_rhyme: 韩语-어/-고尾音（흔들어/사랑하고/맞추고）
  main_rhyme_pattern: 主歌散韵(-봐/-워) → 预副歌散韵(-라/-야) → 副歌排韵(-고/-어) → 循环
  special_techniques:
    - "꼬리(尾巴)"双关：字面意思+挑逗意象，贯穿全曲
    - 副歌"미친 듯이(疯狂地)"三连作情绪强化前缀
    - 桥段"꼬리를 높이 세워(高高竖起尾巴)"呼应标题，制造视觉意象
    - 韩英无缝切换：同行内"I'm not much of a drinker / But I'm a dream girl"
    - "(흔들어 흔들어)"括号重复作呼应声部
