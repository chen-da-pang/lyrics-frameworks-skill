rhyme_audit:
  main_rhyme: ou（由求辙）
  main_rhyme_lines: [L10, L11, L12, L13, L15, L18, L26, L27, L28, L29, L31, L34, L35]
  verse_rhyme_pattern: 衣期辙（L03-L04）→梭波辙（L05-L08），分段换韵
  chorus_rhyme_pattern: 掺韵式准排韵（Hook句掺韵，其余由求辙排韵）
  special_techniques:
    - 双Hook平行结构（有一种X 不能Y，S3/S4各一句）
    - ou遥韵链贯穿两轮副歌（L10-L13-L15-L18-L26-L29-L31-L34-L35）
    - 头韵对句（L05/L07均以"或许"开头）
    - L16句中内韵（朋友/恋友，ou叠韵）
    - L18句中回环（你/我/你）
  segment_rhyme_summary: >
    位置上以句尾韵为主；字数上单押为主，双音节词尾承载单押（如"长久/拥有/借口"）；
    韵母关系上副歌区由求辙（ou）严韵为主，Hook句以梭波辙/中东辙掺韵；
    特殊技巧上属掺韵式准排韵，双Hook平行结构，ou遥韵链贯穿全曲；
    数量规律上主歌分段换韵，副歌接近一韵到底（ou）
