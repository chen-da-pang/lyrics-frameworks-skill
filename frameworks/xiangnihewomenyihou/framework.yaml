meta:
  framework_id: xiangnihewomenyihou-v1
  song_name: 想你和我们以后
  artist: 苏运莹
  language: zh
  total_segments: 6
  total_lines: 27
  rounds: 3
  rhyme_style: 散韵基底，"忙"字遥韵链贯穿全曲（L01/L03/L21/L24/L26），桥段"你不在"一字韵锁定，副歌言前辙/怀来辙稀疏双辙回环
  main_rhyme_vowel: ang（江阳辙，遥韵链）
  tags:
    - 流行
    - 情歌
    - 三轮结构
    - 单副歌
    - 桥段
    - 主歌收尾
    - 遥韵链
    - 一字韵倾向
    - R2无主歌
    - 叠字副歌开头

segments:
  - segment_id: S1
    role: 主歌
    round: R1
    line_range: L01-L04
    lines: 4
    rhyme_pattern: 散韵（ang/ian/ang/e）
    notes: Hook宣言句×2夹叙述推进句，L01=L03完全重复

  - segment_id: S2
    role: 副歌
    round: R1
    line_range: L05-L10
    lines: 6
    rhyme_pattern: 散韵（ian/ou/an/ai/ian/ai），言前辙与怀来辙交替
    notes: 叠字开头"以后以后"，以对比宣言句收尾

  - segment_id: S3
    role: 副歌
    round: R2
    line_range: L11-L16
    lines: 6
    rhyme_pattern: 同S2
    notes: S2完整重复，R2无主歌直接进入副歌

  - segment_id: S4
    role: 桥段
    round: R3
    line_range: L17-L20
    lines: 4
    rhyme_pattern: 偶韵倾向（L18/L20押怀来辙"在"，一字韵锁定）
    notes: 现实对照，"你不在"重复两次形成桥段内锁韵

  - segment_id: S5
    role: 预副歌
    round: R3
    line_range: L21-L23
    lines: 3
    rhyme_pattern: 散韵（ang/e/eng）
    notes: 叠字顿挫句开头，反问句推进，L23为全曲最长行（16字）

  - segment_id: S6
    role: 主歌变体
    round: R3
    line_range: L24-L27
    lines: 4
    rhyme_pattern: 散韵（ang/ao/ang/iou）
    notes: S1变体回返，细节升级（吃饭聊天→聊天打闹，拥抱亲吻→对视害羞），全曲以主歌收尾

