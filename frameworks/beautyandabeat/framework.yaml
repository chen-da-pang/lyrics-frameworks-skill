rhyme_audit:
  main_rhyme: ee音（对应中文衣期辙）
  main_rhyme_pattern: 掺韵式准排韵（副歌ee主韵，掺入oo音）
  verse_rhyme: 偶韵，aw/ai音，宽韵
  special_techniques:
    - 三押（Rap段末尾音节三字全押）
    - 密集排韵（Rap段ee音6行连押）
    - 双韵区交替（Rap段ai区→ee区）
    - 括号内声部（副歌R3含和声括号）
  zh_transfer_value:
    - ee音→衣期辙，副歌掺韵结构可直接移植中文
    - 三押→中文双音节词尾押韵技巧
    - 预副歌长句堆叠动能结构可借鉴
