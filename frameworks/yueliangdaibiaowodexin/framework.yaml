meta:
  framework_id: yueliangdaibiaowodexin-v1
  schema_version: 2
  song_name: 月亮代表我的心
  artist: 邓丽君
  language: zh
  source_type: classic-mandarin-pop-framework
  source_url: ""
  source_note: 本框架沿用邓丽君演唱版本，短行分行。
  lineation_basis: short lyric lines
  total_lines: 19
  total_segments: 4
  rounds: 2
  rhyme_style: 人辰辙 (en/in/un) 主干贯穿；主歌段在后半部实施破韵，再由 Hook 强拉回主韵；桥段平滑近韵链；主歌复刻且变体。
  main_rhyme_vowel: en/in/un (人辰辙)
  tags:
    - 流行
    - 情歌
    - 经典
    - 两轮结构
    - 设问对举
    - 破韵设计
    - 近韵交织链
    - Hook重复
    - 叠词开头

segments:
  - segment_id: S1
    role: 主歌
    round: R1
    name: 主歌A·引入与情怀陈述
    line_range: L01-L05
    line_count: 5
    char_pattern: 7-6-5-5-7
    structural_task: 通过提问与追问切入，陈述情感真实度，并引出核心 Hook 句。
    rhyme_pattern: 全部押主韵（人辰辙），保证开篇稳定听感。
    rhyme_org: 一韵到底
    rhyme_vowel: en -> en -> en -> en -> in
    rhyme_strictness: 严韵
    rhyme_tone: 音节押韵
    rhyme_special: 问答对举；情感宣言并列；Hook收口
    rhyme_scale: 分段主韵
    rhyme_jie: 人辰辙
    technique_summary:
      - technique_id: T01
        type: 对举
        refs:
          - L01
          - L02
        form: 设问对举
        description: 设问与呼应对偶句
        fill_requirement: 句式对称的设问与呼应结构
      - technique_id: T02
        type: 对举
        refs:
          - L03
          - L04
        form: 定中主语 + 副词 + 相同形容词或动作
        description: 句法平行并列宣告，句尾押相同韵脚字
        fill_requirement: 保留主谓并列的平行宣告格式（名词意象可替换，无需绑定具体字眼）

  - segment_id: S2
    role: 主歌
    round: R1
    name: 主歌B·承诺变体
    line_range: L06-L10
    line_count: 5
    char_pattern: 7-6-5-5-7
    structural_task: 承接S1，在第三四句变更为坚贞的忠诚承诺，保持Hook句落点。
    rhyme_pattern: 第三四句实施破韵打破惯性，收尾Hook拉回人辰主韵。
    rhyme_org: 后半破韵回收
    rhyme_vowel: en -> en -> i -> ian -> in
    rhyme_strictness: 宽韵
    rhyme_tone: 音节押韵
    rhyme_special: 首尾复刻；中段破韵；承诺对仗
    rhyme_scale: 破韵回归
    rhyme_jie: 人辰辙 / 一七辙 / 言前辙
    technique_summary:
      - technique_id: T03
        type: 对举
        refs:
          - L08
          - L09
        form: 否定形式承诺对仗
        description: 用平行否定修饰词表达坚守
        fill_requirement: 保留对称的否定修饰式忠诚/坚守承诺结构（无需绑定具体词汇，且尾字不押主韵）

  - segment_id: S3
    role: 桥段
    round: R2
    name: 桥段·记忆与感慨
    line_range: L11-L14
    line_count: 4
    char_pattern: 6-7-6-7
    structural_task: 通过动作和场景回忆，拉开时间跨度，将感情深切度推向高点。
    rhyme_pattern: 采用近韵交织链 un -> in -> ing -> in，听感顺滑。
    rhyme_org: 近韵混押
    rhyme_vowel: un -> in -> ing -> in
    rhyme_strictness: 宽韵
    rhyme_tone: 音节押韵
    rhyme_special: 叠词对举；情感反应；时间拉远
    rhyme_scale: 桥段过渡
    rhyme_jie: 人辰辙 / 中东辙
    technique_summary:
      - technique_id: T04
        type: 对举
        refs:
          - L11
          - L13
        form: 叠词修饰情境对举
        description: 叠词开头引导的具象场景细节
        fill_requirement: 保留首部叠词修饰量定或名词的结构
      - technique_id: T06
        type: 叠词
        refs:
          - L11
          - L13
        form: 首部叠词修饰
        description: 双字叠词开头制造情绪铺垫
        fill_requirement: 句首使用叠词修饰

  - segment_id: S4
    role: 主歌
    round: R2
    name: 主歌C·求证变体
    line_range: L15-L19
    line_count: 5
    char_pattern: 7-6-5-5-7
    structural_task: 回归主歌结构，在第三四句引导对方采取实证动作。
    rhyme_pattern: 第三四句破韵，Hook拉回主韵。
    rhyme_org: 后半破韵回收
    rhyme_vowel: en -> en -> iang -> an -> in
    rhyme_strictness: 宽韵
    rhyme_tone: 音节押韵
    rhyme_special: 行动指引对举；破韵拉回
    rhyme_scale: 破韵回归
    rhyme_jie: 人辰辙 / 江阳辙 / 言前辙
    technique_summary:
      - technique_id: T05
        type: 对举
        refs:
          - L17
          - L18
        form: 动词重叠式指引对举
        description: 重叠动词引导感受与验证
        fill_requirement: 保持动词重叠印证格式（如“A一A”或重叠短语）
      - technique_id: T07
        type: 重复与动作指引
        refs:
          - L17
          - L18
        form: 动词重叠印证
        description: 行动与心智的重叠表达
        fill_requirement: 保留动词重叠节奏

