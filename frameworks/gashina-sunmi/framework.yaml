rhyme_audit:
  main_rhyme: /i/音区（韩文，对应中文"一七辙"）
  main_rhyme_pattern: 主歌偶韵，副歌锚点叠咏
  special_techniques:
    - 双锚点对比：韩文"가시나"（女孩/你这个女孩）与英文"Can't nobody stop me now"形成情感对比（受伤→反抗）
    - 情感弧线：主歌受伤→副歌质问→英文段宣示独立，三段情感递进
    - "I'm a bad bad girl"桥段：英文自我宣言，与韩文脆弱形成反差
    - 三层收尾：桥段英文宣言→英文锚点→가시나锚点→英文锚点，层层叠加
