meta:
  framework_id: xiaoyu-zhangzhenyue-v1
  song_name: 小宇
  artist: 张震岳
  language: zh-tw
  total_segments: 5
  total_lines: 33
  rounds: 2
  rhyme_style: 主歌衣期辙（i）主韵，副歌江阳辙（ang）结构锚点（"怎麼樣"），分段换韵；主歌内部掺韵丰富（人辰辙ing、姑苏辙ü）
  main_rhyme_vowel: i（衣期辙，主歌主韵）
  tags:
    - 流行
    - 情歌
    - 台湾流行
    - 两轮结构
    - 平行主歌结构
    - 比喻对句
    - 扩展副歌
    - 条件句尾段
    - 长短句交替

segments:
  - segment_id: S1
    role: 主歌一
    round: R1
    line_range: L01-L08
    char_pattern: 8/8/10/6/8/8/10/8
    rhyme_summary: 衣期辙（i）主韵，妳/裡/地押韵；睛/停（ing）、遇/雨（ü）、雲（un）掺韵；长短句交替（10字+6字）
    notes: L01/L15平行起句（"總有些X"），L05-L08为比喻对句（"我的愛就像一片X / 在你的X無處停"）

  - segment_id: S2
