    round: R1
    line_range: L09-L14
    char_pattern: 8/9/8/8/9/7
    rhyme_summary: 江阳辙（ang）结构锚点（L09/L11"怎麼樣"），衣期辙（i）掺韵（L12/L13/L14）
    notes: "不管X會怎麼樣 / 至少Y"排比结构，L13-L14为情感宣言收束

  - segment_id: S3
    role: 主歌二
    round: R2
    line_range: L15-L22
    char_pattern: 8/8/10/6/8/8/11/8
    rhyme_summary: 衣期辙（i）主韵，提/題/裡押韵；面（ian）、舟（ou）、停（ing）、灣（an）、蕩（ang）掺韵
    notes: 与S1平行结构，L15≈L01，L19-L20≈L05-L06（比喻对句），L21比L07多1字（11字）

  - segment_id: S4
    role: 扩展副歌
    round: R2
    line_range: L23-L30
    char_pattern: 9/9/9/8/9/9/9/9
    rhyme_summary: 江阳辙（ang）结构锚点（L23/L25/L27/L29"怎麼樣"），衣期辙（i）掺韵（L26/L28/L30）
