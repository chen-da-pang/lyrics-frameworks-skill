rhyme_audit:
  main_rhyme: 衣期辙（i）
  main_rhyme_pattern: 主歌偶韵为主（妳/裡/地，提/題/裡），副歌江阳辙（ang）结构锚点
  special_techniques:
    - S1/S3平行主歌结构（"總有些X"起句）
    - 比喻对句（"我的愛就像一片X / 在你的X無處停"）
    - 长短句交替（10字+6字对：L03/L04, L07/L08, L17/L18）
    - 副歌"不管X怎麼樣"排比锚点
    - S4为S2扩展版（加"我"字强调，新增升级对句）
    - 叠字回环（L21"尋尋覓覓"）
    - 条件句尾段（"如果你還是沒法相信"）
